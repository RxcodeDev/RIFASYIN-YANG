<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rifa Oficial</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:ital,wght@0,700;0,800;0,900;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="icon" type="image/png" href="assets/logo.png">
</head>
<body>

<!-- Chispas decorativas -->
<div class="sparks" id="sparks"></div>

<!-- NAV -->
<nav>
  <div class="nav-logo"><!-- renderer.js --></div>
  <ul class="nav-links"><!-- renderer.js --></ul>
  <button class="nav-status-btn" id="btnMiBoleto" aria-haspopup="dialog">
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" width="15" height="15" style="flex-shrink:0;display:block"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
    Mi Boleto
  </button>
</nav>

<!-- MODAL MI BOLETO -->
<div class="status-backdrop" id="statusBackdrop" role="dialog" aria-modal="true" aria-label="Consultar mi boleto" hidden>
  <div class="status-modal">
    <button class="status-close" id="statusClose" aria-label="Cerrar">&times;</button>
    <h3 class="status-title">CONSULTA TU <span class="g">BOLETO</span></h3>
    <p class="status-sub">Ingresa tu número para ver su estado actual.</p>
    <div class="status-input-wrap">
      <span class="status-hash">#</span>
      <input type="number" id="statusInput" class="status-input" placeholder="000" min="1" max="1100" autocomplete="off">
    </div>
    <div class="status-result" id="statusResult" role="status" aria-live="polite"></div>
  </div>
</div>

<!-- HERO -->
<section class="hero" id="inicio">
  <div class="hero-flames"></div>
  <div class="hero-grid"></div>

  <div class="hero-content">
    <div class="hero-badge"><!-- renderer.js --></div>

    <h1 class="hero-title"><!-- renderer.js --></h1>

    <p class="hero-sub"><!-- renderer.js --></p>

    <div class="prizes-row"><!-- renderer.js --></div>

    <div class="price-block">
      <span class="price-label"><!-- renderer.js --></span>
      <span class="price-tag"><!-- renderer.js --></span>
    </div>

    <div class="hero-cta">
      <a href="#comprar" class="btn-fire"><!-- renderer.js --></a>
      <a href="#disponibles" class="btn-ghost"><!-- renderer.js --></a>
    </div>
  </div>

  <!-- Coche -->
  <div class="hero-car-wrap">
    <img src="assets/switf.webp" alt="Suzuki Swift 2026" loading="lazy" width="820" height="480">
  </div>
  <div class="hero-car-glow"></div>

  <div class="tickets-badge"><!-- renderer.js --></div>
</section>

<!-- STATS -->
<div class="stats-bar">
  <div class="stat"><span class="stat-n">1,100</span><span class="stat-l">Boletos totales</span></div>
  <div class="stat"><span class="stat-n">$550</span><span class="stat-l">Por boleto</span></div>
  <div class="stat">
    <svg class="stat-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6.5 10h-2v7h2v-7zm6 0h-2v7h2v-7zm8.5 9H2v2h19v-2zm-2.5-9h-2v7h2v-7zM11.5 1L2 6v2h19V6l-9.5-5z"/></svg>
    <span class="stat-l">Facilidad de pago</span>
  </div>
  <div class="stat"><span class="stat-n">10</span><span class="stat-l">Ganadores</span></div>
</div>

<!-- GALERÍA -->
<!-- GALERÍA + VIDEO -->
<section class="section slider-section" id="galeria">
  <span class="section-eyebrow">¡Mira lo que puedes ganar!</span>
  <h2 class="section-title">TU PRÓXIMO <span class="g">AUTO</span></h2>
  <div class="media-grid">
    <div class="slider" id="slider" role="region" aria-label="Galería del premio">
      <div class="slider-track" id="sliderTrack">
        <figure class="slide"><img src="assets/img/1.jpeg" alt="Suzuki Swift 2026 — vista 1" loading="lazy"></figure>
        <figure class="slide"><img src="assets/img/2.jpeg" alt="Suzuki Swift 2026 — vista 2" loading="lazy"></figure>
        <figure class="slide"><img src="assets/img/3.jpeg" alt="Suzuki Swift 2026 — vista 3" loading="lazy"></figure>
      </div>
      <button class="slider-btn slider-prev" id="sliderPrev" aria-label="Anterior">&#8249;</button>
      <button class="slider-btn slider-next" id="sliderNext" aria-label="Siguiente">&#8250;</button>
      <div class="slider-dots" id="sliderDots"></div>
    </div>
    <div class="slider video-container">
      <video
        id="prizeVideo"
        src="assets/img/video.mp4"
        controls
        playsinline
        muted
        loop
        preload="metadata"
        poster="assets/img/1.jpeg"
        aria-label="Video del Suzuki Swift 2026"
      ></video>
    </div>
  </div>
</section>

<!-- COMPRAR -->
<section class="section ticket-section" id="comprar">
  <div class="ticket-wrap">
    <div class="section-header" style="text-align:center;margin-bottom:0">
      <span class="section-eyebrow"><!-- renderer.js --></span>
      <h2 class="section-title"><!-- renderer.js --></h2>
    </div>

    <div class="ticket-card">
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="r"><!-- renderer.js --></button>
        <button class="mode-tab" data-mode="m"><!-- renderer.js --></button>
      </div>

      <!-- Panel aleatorio -->
      <div id="panel-r" class="show">
        <div class="rand-display">
          <span class="rand-num" id="rnum">?</span>
          <p class="rand-hint"><!-- renderer.js --></p>
        </div>
        <div style="text-align:center">
          <button class="btn-fire" id="btn-genrand" style="font-size:1rem;padding:1rem 3rem"><!-- renderer.js --></button>
        </div>
      </div>

      <!-- Panel manual -->
      <div id="panel-m">
        <div class="manual-wrap">
          <input type="number" class="ticket-input" id="minput" placeholder="000" min="1" max="1100" autocomplete="off">
          <div class="range-hint"><!-- renderer.js --></div>
          <div id="t-status" role="status" aria-live="polite"></div>
        </div>
      </div>

      <div class="ticket-actions">
        <a class="btn-wa" id="wa-btn" href="#" target="_blank" rel="noopener noreferrer"><!-- renderer.js --></a>
      </div>

      <div class="ticket-note"><!-- renderer.js --></div>
    </div>
  </div>
</section>

<!-- DISPONIBLES -->
<section class="section avail-section" id="disponibles">
  <span class="section-eyebrow">Consulta</span>
  <h2 class="section-title">BOLETOS <span class="g">DISPONIBLES</span></h2>

  <div class="avail-panel">

    <!-- Buscador -->
    <div class="avail-search">
      <span class="search-prefix" aria-hidden="true">#</span>
      <input type="number" class="s-input" id="sinput" placeholder="Buscar número..." min="1" max="1100" autocomplete="off">
    </div>

    <!-- Filtros + Leyenda -->
    <div class="avail-controls">
      <div class="f-btns">
        <button class="f-btn on" data-filter="all">Todos</button>
        <button class="f-btn" data-filter="av">Disponibles</button>
        <button class="f-btn" data-filter="tk">Vendidos</button>
      </div>
      <div class="legend">
        <div class="leg"><span class="dot av"></span>Libre</div>
        <div class="leg"><span class="dot tk"></span>Vendido</div>
        <div class="leg"><span class="dot sl"></span>Elegido</div>
      </div>
    </div>

    <div class="tgrid" id="tgrid"></div>

  </div>
</section>

<!-- SOCIAL -->
<section class="social-section" id="redes">
  <span class="section-eyebrow"><!-- renderer.js --></span>
  <h2 class="section-title"><!-- renderer.js --></h2>
  <p><!-- renderer.js --></p>
  <div class="social-cards"><!-- renderer.js --></div>
  <div class="deco-line"><!-- renderer.js --></div>
</section>

<!-- FOOTER -->
<footer>
  <div class="f-brand">
    <img class="f-logo-img" src="assets/logo.png" alt="Rifas Yin &amp; Yang">
    <span class="f-logo"><!-- renderer.js --></span>
  </div>
  <div class="f-text"><!-- renderer.js --></div>
</footer>

<script type="module" src="js/main.js"></script>
</body>
</html>
