server {
    listen       80;
    server_name  localhost;
    root         /usr/share/nginx/html;
    index        index.html;

    # Fuerza el charset correcto para todos los textos
    charset utf-8;

    # MIME types correctos para ES Modules (.js → application/javascript)
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Compresión gzip para assets estáticos
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml;
    gzip_min_length 1024;

    # HTML: sin cache para que los deploys lleguen inmediatamente
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # JS/CSS: nunca cachear — el Docker rebuild cambia el contenido
    # NOTE: no-store es más agresivo que no-cache: el browser siempre pide al servidor
    location ~* \.(css|js)$ {
        add_header Cache-Control "no-store";
    }

    # Imágenes/fuentes: cache larga (cambian raramente)
    location ~* \.(png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Proxy al servicio de uploads — ^~ evita que el regex de imágenes intercepte rutas
    # como /api/uploads/foto.jpg antes de llegar aquí.
    location ^~ /api/ {
        proxy_pass         http://upload:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;

        # Base64 añade ~34% de overhead sobre el binario original.
        # Límite real del servidor Node = 5 MB binario → ~6.7 MB en base64 + JSON wrapper.
        # Se usa 8m para tener margen holgado.
        client_max_body_size 8m;
    }

    # Ruta principal y panel — siempre sirve el index correspondiente (SPA-safe)
    location /panel/ {
        try_files $uri $uri/ /panel/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Oculta la versión de nginx en headers de error
    server_tokens off;
}
