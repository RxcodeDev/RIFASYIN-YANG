# ── HTTP: solo ACME challenge + redirect a HTTPS ─────────────────────────────
server {
    listen 80;
    server_name rifasyingyang.rxcode.com.mx;

    # Let's Encrypt webroot challenge — debe estar accesible ANTES de tener cert
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name rifasyingyang.rxcode.com.mx;
    root  /usr/share/nginx/html;
    index index.html;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/rifasyingyang.rxcode.com.mx/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rifasyingyang.rxcode.com.mx/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # ── Security headers ─────────────────────────────────────────────────────
    # NOTE: HSTS 6 meses — solo activo una vez que el dominio funciona 100% en HTTPS.
    add_header Strict-Transport-Security "max-age=15768000" always;
    add_header X-Frame-Options           DENY                always;
    add_header X-Content-Type-Options    nosniff             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    server_tokens off;
    charset utf-8;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Compresión ───────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── Cache por tipo de archivo ─────────────────────────────────────────────
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    location ~* \.(css|js)$ {
        add_header Cache-Control "no-store";
    }

    location ~* \.(png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ── Proxy al servicio de uploads ─────────────────────────────────────────
    location ^~ /api/ {
        proxy_pass         http://upload:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 8m;
    }

    # ── Rutas SPA ─────────────────────────────────────────────────────────────
    location /panel/ {
        try_files $uri $uri/ /panel/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
